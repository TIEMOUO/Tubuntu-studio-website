<section id="cta" class="cta-section">

  <div class="container">

    <div class="cta-card">

      <div class="cta-content">

        <h2>
          {{ title }}
        </h2>

        <p>
          {{ description }}
        </p>

        <div class="cta-actions">

          <a href="#contact" class="btn primary">
            {{ primaryAction }}
          </a>


          <a href="#portfolio" class="btn secondary">
            {{ secondaryAction }}
          </a>

        </div>

      </div>

      <div class="cta-glow"></div>

    </div>

  </div>

</section>
